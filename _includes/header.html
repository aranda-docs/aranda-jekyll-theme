<meta http-equiv="Content-Security-Policy" content="connect-src *.withgoogle.com/ *.azurewebsites.net ai.arandasoft.com 'self'; font-src 'self' data: *.azurewebsites.net; img-src https://*.gstatic.com/ http://*.google.com/ *.googleapis.com/ 'self' data: blob: *.azurewebsites.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.google.com *.googleapis.com *.googletagmanager.com *.azurewebsites.net ai.arandasoft.com; style-src *.google.com/ 'self' 'unsafe-inline' *.azurewebsites.net; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' *.google.com *.googleapis.com *.googleadservices.com *.googletagmanager.com *.azurewebsites.net ai.arandasoft.com; frame-src 'self' *.azurewebsites.net ai.arandasoft.com" />
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.sg_description }}{% endif %}">
<meta name="keywords" content="{{ site.keywords }}">
<meta name="author" content="{{ site.author }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}{{ site.favicon }}">
<link rel="stylesheet" href="{{ site.baseurl }}{{ site.styles }}" media="screen">
<script src="{{ site.baseurl }}/assets/js/libs/jquery-2.1.4.min.js"></script>
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/print_doc.css" media="print">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/sidebar.css" media="screen">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/index.css" media="screen">
<script>
    function resizeIframe(){
        const iframes = document.querySelectorAll("iframe.content-fit");
        if (iframes.length) {
            iframes.forEach((ifrm) => {
                const fullIframeHeight =
                    ifrm.contentWindow.document.body.scrollHeight + "px";
                ifrm.height = fullIframeHeight;
            });
        }
    }
</script>
